# alembic.ini — Alembic configuration file.
#
# The database URL is intentionally NOT set here — it would embed credentials
# in the repository.  env.py reads DATABASE_URL from the environment instead.
# Run migrations with:
#   alembic upgrade head          (apply all pending migrations)
#   alembic downgrade -1          (roll back one migration)
#   alembic revision --autogenerate -m "description"  (generate a new migration)

[alembic]
script_location = alembic

# Suppress the "INFO" banner Alembic prints on every run — warnings and errors
# still appear.
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
