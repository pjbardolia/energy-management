server {
    listen 80;
    server_name _;

    # API — forward to the FastAPI container over the Docker network.
    # Trailing slashes on BOTH location and proxy_pass are required: they strip
    # the /api prefix so FastAPI receives /login, not /api/login. Removing
    # either one breaks every endpoint with a 404.
    location /api/ {
        proxy_pass         http://api:8000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Service worker — must never be cached, or PWA updates won't propagate
    # to installed home-screen apps. Browsers already avoid caching sw.js
    # aggressively, but Nginx's default static-file caching can override that.
    location = /sw.js {
        root                /usr/share/nginx/html;
        add_header          Cache-Control "no-cache, no-store, must-revalidate";
        add_header          Pragma "no-cache";
        expires             0;
    }

    # PWA manifest — short cache only, so icon/name/theme changes propagate
    # reasonably fast without refetching on every single page load.
    location = /manifest.json {
        root                /usr/share/nginx/html;
        add_header          Cache-Control "public, max-age=300";
    }

    # React SPA. try_files falls back to index.html so client-side routes
    # resolve instead of 404ing on refresh.
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;
    }
}
